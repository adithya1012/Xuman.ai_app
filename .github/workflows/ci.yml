name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint src --max-warnings 0

  bundle:
    name: Metro Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Export iOS bundle
        run: npx expo export --platform ios --output-dir /tmp/export-check
